# A股策略选股系统配置 v1.0.5

# 扫描范围
scan:
  pool: all
  custom_codes: []
  exclude_st: true
  exclude_kcb: false
  exclude_bse: true

# 策略配置
strategies:
  # === 经典策略 ===
  ma_cross:
    enabled: true
    short_period: 5
    long_period: 20
    within_days: 3

  macd:
    enabled: true
    fast: 12
    slow: 26
    signal: 9
    mode: "golden_cross"

  rsi:
    enabled: true
    period: 14
    oversold_threshold: 30
    overbought_threshold: 70
    mode: "oversold_bounce"

  bollinger:
    enabled: false
    period: 20
    std_dev: 2
    mode: "lower_bounce"

  # === 量价策略 ===
  volume:
    enabled: true
    period: 20
    surge_multiplier: 2.0

  trend:
    enabled: true
    mode: "bullish_alignment"

  # === 进阶策略 (参考 daily_stock_analysis) ===
  shrink_pullback:
    enabled: true
    vol_threshold: 0.7
    bias_threshold: 2.0

  one_yang_three_yin:
    enabled: false
    yang_pct: 3.0

  bottom_volume:
    enabled: true
    low_pct: 30
    vol_multiplier: 2.0

  box_oscillation:
    enabled: false
    window: 20
    range_pct: 15
    lower_pct: 25

  volume_breakout:
    enabled: true
    vol_multiplier: 2.0
    window: 20

# 组合模式: single=单策略, composite=多策略交集, any=并集
combination: any

# 输出配置
output:
  max_results: 50
  format: table
  save_to_file: true
  output_dir: output

# 数据配置
data:
  history_days: 120
  source: baostock
