# A 股策略选股系统配置

# 扫描范围
scan:
  # 股票池: all=全市场, hs300=沪深300, zz500=中证500, cyb=创业板, custom=自定义
  pool: all
  # 自定义股票列表 (pool=custom 时生效)
  custom_codes: []
  # 排除 ST 股票
  exclude_st: true
  # 排除科创板 (688)
  exclude_kcb: false
  # 排除北交所 (8开头)
  exclude_bse: true

# 策略配置
strategies:
  ma_cross:
    enabled: true
    short_period: 5
    long_period: 20
    # 金叉发生天数 (0=今天, 1=昨天, N=前N天内)
    within_days: 3

  macd:
    enabled: true
    fast: 12
    slow: 26
    signal: 9
    # MACD 金叉 / 零轴上方金叉 / 底背离
    mode: "golden_cross"  # golden_cross / above_zero / bullish_divergence

  rsi:
    enabled: true
    period: 14
    # 超卖反弹 / 超买回调
    oversold_threshold: 30
    overbought_threshold: 70
    mode: "oversold_bounce"  # oversold_bounce / overbought_reject

  bollinger:
    enabled: false
    period: 20
    std_dev: 2
    # 下轨反弹 / 上轨突破
    mode: "lower_bounce"  # lower_bounce / upper_break

  volume:
    enabled: true
    period: 20
    # 放量倍数 (今日成交量 / 均量)
    surge_multiplier: 2.0

  trend:
    enabled: true
    # 多头排列: MA5 > MA10 > MA20 > MA60
    mode: "bullish_alignment"

# 组合模式: single=单策略, composite=多策略交集, any=并集
combination: composite

# 输出配置
output:
  # 结果数量上限
  max_results: 50
  # 输出格式: table / json / csv
  format: table
  # 保存到文件
  save_to_file: true
  output_dir: output

# 数据配置
data:
  # 历史数据天数 (至少60天保证MA60可算)
  history_days: 120
  # 数据源: akshare (暂仅支持)
  source: akshare
